<!DOCTYPE html>

<head>

    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #f3f4f6;
            overflow: hidden; /* Prevent body scroll for app-like feel */
            overscroll-behavior-y: contain;
        }

        /* 3D Card Flip Styles */
        .perspective-1000 {
            perspective: 1000px;
        }
        .transform-style-3d {
            transform-style: preserve-3d;
        }
        .backface-hidden {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .rotate-y-180 {
            transform: rotateY(180deg);
        }

        /* Swipe Card Container */
        #card-container {
            position: relative;
            width: 100%;
            height: 60vh;
            max-width: 400px;
            margin: 0 auto;
        }

        .swipe-card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            background: white;
            cursor: grab;
            transition: transform 0.3s ease, opacity 0.3s ease;
            transform-origin: 50% 100%;
            will-change: transform;
            display: flex;
            flex-direction: column;
        }

        .swipe-card:active {
            cursor: grabbing;
        }

        .swipe-card.dragging {
            transition: none; /* Disable transition during drag for immediate feedback */
        }

        /* Swipe Stamps (Keep / Discard) */
        .stamp {
            position: absolute;
            top: 2rem;
            padding: 0.5rem 1.5rem;
            border: 4px solid;
            border-radius: 0.5rem;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            opacity: 0;
            z-index: 10;
            transform: rotate(-15deg);
        }

        .stamp-remember {
            right: 2rem;
            color: #22c55e;
            border-color: #22c55e;
            transform: rotate(15deg);
        }

        .stamp-forgot {
            left: 2rem;
            color: #ef4444;
            border-color: #ef4444;
        }

        /* Content Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        
        .correct-ans { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important;}
        .wrong-ans { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important;}
    </style>
</head>

                zh_term: "复合词",
                eng: "\"...compound words, to be more exact, is by stringing words together...\"",
                zh: "将两个或以上本身可独立存在的单字(自由语素)直接串联组合,衍生出全新单字的构词法(如 greenhouse, pickpocket)。"
            },
            {
                id: 25,
                term: "Syntax",
                zh_term: "句法学",
                eng: "\"study of these rules\" that govern \"the combination of words to form grammatically permissible sentences...\"",
                zh: "主要研究单字如何根据特定的规律与结构,组合排列成符合语法规则的、可被接受的句子。研究句子的内部结构与造句规则。"
            },
            {
                id: 26,
                term: "Word-level categories",
                zh_term: "词级范畴/词类",
                eng: "Major lexical categories: \"Noun, Verb, Adjective, Preposition (heads of phrases).\" Minor lexical categories: \"determiner, degree words, Auxiliary, Conjunction.\"",
                zh: "主要词汇范畴(实词): 名、动、形、介词，作短语的「中心语(head)」。次要词汇范畴(功能词): 限定词、助动词、连词等，作连接或辅助修饰。"
            },
            {
                id: 27,
                term: "Deep and surface structure",
                zh_term: "深层结构与表层结构",
                eng: "Deep structure: \"formed by XP rule...\" Surface structure: \"corresponding to the final syntactic form of the sentence which results from appropriate transformations.\"",
                zh: "生成语法理论。深层结构: 句子底层的抽象句法表征,决定逻辑基础。表层结构: 深层结构经过「转换规则」后,实际听到的句子外在排列形式。"
            },
            {
                id: 28,
                term: "Mechanisms of sentence formation",
                zh_term: "句子生成的句法机制",
                eng: "Phrase structure rules (composition), Subcategorization (match between heads and complements), Transformations (modify deep structure).",
                zh: "短语结构规则(规定词类组合)、次范畴化(确保中心语和补足语正确匹配)、转换(透过位移/删除等将深层结构推导为表层结构)。"
            }
        ];

        const app = {
            data: [],
            currentCardIndex: 0,
            mode: 'home', // home, swipe, quiz, results
            swipeStats: { remembered: 0, forgot: 0 },
            quizStats: { score: 0, total: 0 },
            currentQuizItem: null,
            
            // DOM Elements
            els: {
                headerStats: document.getElementById('header-stats'),
                progressText: document.getElementById('progress-text'),
                screens: {
                    home: document.getElementById('screen-home'),
                    swipe: document.getElementById('screen-swipe'),
                    quiz: document.getElementById('screen-quiz'),
                    results: document.getElementById('screen-results'),
                    knowledge: document.getElementById('screen-knowledge')
                },
                cardContainer: document.getElementById('card-container')
            },

            init() {
                // Shuffle data copy for operations
                this.data = [...linguisticsData];
            },

            showScreen(screenName) {
                Object.values(this.els.screens).forEach(el => {
                    el.classList.add('hidden');
                    el.classList.remove('flex');
                });
                
                const activeScreen = this.els.screens[screenName];
                activeScreen.classList.remove('hidden');
                activeScreen.classList.add('flex');
                
                this.mode = screenName;

                if (screenName === 'home' || screenName === 'knowledge') {
                    this.els.headerStats.classList.add('hidden');
                } else {
                    this.els.headerStats.classList.remove('hidden');
                }
            },

            updateProgress() {
                if (this.mode === 'swipe') {
                    this.els.progressText.innerText = `${this.currentCardIndex}/${this.data.length}`;
                } else if (this.mode === 'quiz') {
                    this.els.progressText.innerText = `${this.quizStats.total}/${this.data.length}`;
                }
            },

            shuffle(array) {
                let currentIndex = array.length, randomIndex;
                while (currentIndex !== 0) {
                    randomIndex = Math.floor(Math.random() * currentIndex);
                    currentIndex--;
                    [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
                }
                return array;
            },

            // --- SWIPE MODE ---
            startSwipeMode() {
                this.data = this.shuffle([...linguisticsData]);
                this.currentCardIndex = 0;
                this.swipeStats = { remembered: 0, forgot: 0 };
                this.els.cardContainer.innerHTML = '';
                this.showScreen('swipe');
                this.updateProgress();
                this.renderDeck();
            },

            renderDeck() {
                this.els.cardContainer.innerHTML = '';
                // Render top 3 cards for performance and visual depth
                const cardsToRender = this.data.slice(this.currentCardIndex, this.currentCardIndex + 3);
                
                // Render in reverse order so the first is on top (due to absolute positioning)
                for (let i = cardsToRender.length - 1; i >= 0; i--) {
                    const item = cardsToRender[i];
                    const offsetIndex = i;
                    const cardEl = this.createCardElement(item, offsetIndex);
                    this.els.cardContainer.appendChild(cardEl);
                    
                    if (offsetIndex === 0) {
                        this.initDrag(cardEl);
                    }
                }
            },

            createCardElement(item, offsetIndex) {
                const card = document.createElement('div');
                card.className = `swipe-card transform-style-3d ${offsetIndex === 0 ? '' : 'pointer-events-none'}`;
                
                // Visual depth for cards underneath
                const scale = 1 - (offsetIndex * 0.05);
                const translateY = offsetIndex * 15;
                const opacity = 1 - (offsetIndex * 0.3);
                card.style.transform = `scale(${scale}) translateY(${translateY}px)`;
                card.style.opacity = opacity;
                card.style.zIndex = 100 - offsetIndex;

                card.innerHTML = `
                    <!-- Stamps -->
                    <div class="stamp stamp-remember">已记住</div>
                    <div class="stamp stamp-forgot">没记住</div>
                    
                    <!-- Card Inner (for flip) -->
                    <div class="relative w-full h-full transform-style-3d transition-transform duration-500 card-inner">
                        <!-- Front of Card (Term) -->
                        <div class="absolute w-full h-full bg-white rounded-2xl backface-hidden flex flex-col items-center justify-center p-8 text-center border-2 border-gray-100">
                            <h2 class="text-3xl font-bold text-indigo-900 mb-2">${item.term}</h2>
                            <h3 class="text-xl text-gray-500">${item.zh_term}</h3>
                            <div class="absolute bottom-6 text-xs text-gray-400 bg-gray-50 px-3 py-1 rounded-full"><i class="fa-solid fa-hand-pointer mr-1"></i> 点击翻转释义</div>
                        </div>
                        
                        <!-- Back of Card (Definition) -->
                        <div class="absolute w-full h-full bg-indigo-50 rounded-2xl backface-hidden rotate-y-180 flex flex-col p-6 border-2 border-indigo-100 overflow-y-auto custom-scrollbar">
                            <div class="text-center pb-3 border-b border-indigo-200 mb-4">
                                <span class="font-bold text-indigo-800">${item.term}</span>
                            </div>
                            <div class="flex-1 overflow-y-auto custom-scrollbar pr-2">
                                <div class="mb-4">
                                    <h4 class="text-xs font-bold text-indigo-400 uppercase tracking-wider mb-1">English Definition</h4>
                                    <p class="text-gray-800 font-medium italic text-sm leading-relaxed">${item.eng}</p>
                                </div>
                                <div>
                                    <h4 class="text-xs font-bold text-indigo-400 uppercase tracking-wider mb-1">中文释义</h4>
                                    <p class="text-gray-700 text-sm leading-relaxed">${item.zh}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                // Flip logic
                let isDragging = false;
                card.addEventListener('mousedown', () => isDragging = false);
                card.addEventListener('mousemove', () => isDragging = true);
                card.addEventListener('mouseup', (e) => {
                    if (!isDragging && offsetIndex === 0) {
                        this.toggleCardFlip(card);
                    }
                });
                
                // Touch equivalents for flip
                let startX, startY;
                card.addEventListener('touchstart', (e) => {
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                    isDragging = false;
                }, {passive: true});
                card.addEventListener('touchmove', (e) => {
                    const dx = Math.abs(e.touches[0].clientX - startX);
                    const dy = Math.abs(e.touches[0].clientY - startY);
                    if (dx > 10 || dy > 10) isDragging = true;
                }, {passive: true});
                card.addEventListener('touchend', (e) => {
                    if (!isDragging && offsetIndex === 0) {
                        this.toggleCardFlip(card);
                    }
                });

                return card;
            },

            toggleCardFlip(cardElement) {
                const inner = cardElement.querySelector('.card-inner');
                if (inner.style.transform === 'rotateY(180deg)') {
                    inner.style.transform = 'rotateY(0deg)';
                } else {
                    inner.style.transform = 'rotateY(180deg)';
                }
            },

            flipCurrentCard() {
                const topCard = this.els.cardContainer.lastElementChild;
                if(topCard) this.toggleCardFlip(topCard);
            },

            initDrag(element) {
                let startX = 0, currentX = 0, currentY = 0, isDragging = false;
                const windowWidth = window.innerWidth;
                const threshold = windowWidth * 0.25; // Swipe threshold
                
                const stampRemember = element.querySelector('.stamp-remember');
                const stampForgot = element.querySelector('.stamp-forgot');

                const onDragStart = (e) => {
                    isDragging = true;
                    startX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                    element.classList.add('dragging');
                };

                const onDragMove = (e) => {
                    if (!isDragging) return;
                    // Prevent scrolling while swiping
                    if(e.cancelable) e.preventDefault(); 
                    
                    const x = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                    currentX = x - startX;
                    
                    // Add slight Y movement and rotation
                    const rotate = currentX * 0.05;
                    element.style.transform = `translateX(${currentX}px) translateY(${Math.abs(currentX)*0.1}px) rotate(${rotate}deg)`;
                    
                    // Show stamps based on direction
                    // Left swipe: currentX < 0 -> Remembered (Green)
                    // Right swipe: currentX > 0 -> Forgot (Red)
                    if (currentX < -20) {
                        stampRemember.style.opacity = Math.min(Math.abs(currentX) / threshold, 1);
                        stampForgot.style.opacity = 0;
                    } else if (currentX > 20) {
                        stampForgot.style.opacity = Math.min(Math.abs(currentX) / threshold, 1);
                        stampRemember.style.opacity = 0;
                    } else {
                        stampRemember.style.opacity = 0;
                        stampForgot.style.opacity = 0;
                    }
                };

                const onDragEnd = () => {
                    if (!isDragging) return;
                    isDragging = false;
                    element.classList.remove('dragging');
                    
                    if (currentX < -threshold) {
                        this.swipeCard(element, 'left');
                    } else if (currentX > threshold) {
                        this.swipeCard(element, 'right');
                    } else {
                        // Reset position
                        element.style.transform = `translateX(0px) translateY(0px) rotate(0deg)`;
                        stampRemember.style.opacity = 0;
                        stampForgot.style.opacity = 0;
                    }
                    currentX = 0;
                };

                // Mouse events
                element.addEventListener('mousedown', onDragStart);
                window.addEventListener('mousemove', onDragMove, { passive: false });
                window.addEventListener('mouseup', onDragEnd);
                
                // Touch events
                element.addEventListener('touchstart', onDragStart, { passive: true });
                window.addEventListener('touchmove', onDragMove, { passive: false });
                window.addEventListener('touchend', onDragEnd);
            },

            manualSwipe(direction) {
                const topCard = this.els.cardContainer.lastElementChild;
                if (!topCard) return;
                this.swipeCard(topCard, direction);
            },

            swipeCard(element, direction) {
                const windowWidth = window.innerWidth;
                const targetX = direction === 'left' ? -windowWidth : windowWidth;
                const rotate = direction === 'left' ? -30 : 30;
                
                element.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease';
                element.style.transform = `translateX(${targetX}px) translateY(50px) rotate(${rotate}deg)`;
                element.style.opacity = 0;

                // Record stats (Left = Remembered, Right = Forgot)
                if (direction === 'left') {
                    this.swipeStats.remembered++;
                } else {
                    this.swipeStats.forgot++;
                }

                setTimeout(() => {
                    this.currentCardIndex++;
                    this.updateProgress();
                    if (this.currentCardIndex >= this.data.length) {
                        this.showResults();
                    } else {
                        this.renderDeck();
                    }
                }, 300);
            },

            // --- QUIZ MODE ---
            startQuizMode() {
                this.data = this.shuffle([...linguisticsData]);
                this.quizStats = { score: 0, total: 0 };
                this.showScreen('quiz');
                this.loadNextQuizQuestion();
            },

            loadNextQuizQuestion() {
                if (this.quizStats.total >= this.data.length) {
                    this.showResults();
                    return;
                }

                document.getElementById('quiz-next-btn').classList.add('hidden');
                document.getElementById('quiz-options').innerHTML = '';
                
                this.currentQuizItem = this.data[this.quizStats.total];
                this.quizStats.total++;
                this.updateProgress();
                
                // Update UI
                document.getElementById('quiz-q-num').innerText = this.quizStats.total;
                document.getElementById('quiz-score').innerText = this.quizStats.score;
                document.getElementById('quiz-question-eng').innerHTML = `<i class="fa-solid fa-quote-left text-indigo-300 mr-2"></i>${this.currentQuizItem.eng}`;
                document.getElementById('quiz-question-zh').innerHTML = this.currentQuizItem.zh;

                // Generate Options
                let options = [this.currentQuizItem];
                let pool = [...linguisticsData].filter(item => item.id !== this.currentQuizItem.id);
                pool = this.shuffle(pool);
                
                // Pick 3 wrong options
                options.push(pool[0], pool[1], pool[2]);
                options = this.shuffle(options);

                const optionsContainer = document.getElementById('quiz-options');
                options.forEach((opt, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'w-full text-left bg-white border-2 border-gray-100 p-4 rounded-xl shadow-sm hover:border-indigo-300 hover:bg-indigo-50 transition-all font-semibold text-gray-700 flex justify-between items-center group';
                    btn.innerHTML = `
                        <span>
                            <span class="inline-block w-6 h-6 rounded-full bg-gray-100 text-gray-500 text-xs text-center leading-6 mr-3 group-hover:bg-indigo-200 group-hover:text-indigo-700 transition-colors">${['A','B','C','D'][index]}</span>
                            ${opt.term} <span class="text-sm font-normal text-gray-500 ml-1">(${opt.zh_term})</span>
                        </span>
                        <i class="fa-solid fa-circle-check opacity-0 text-xl"></i>
                    `;
                    btn.onclick = () => this.handleQuizAnswer(btn, opt.id === this.currentQuizItem.id, options);
                    optionsContainer.appendChild(btn);
                });
            },

            handleQuizAnswer(selectedBtn, isCorrect, optionsData) {
                // Disable all buttons
                const buttons = document.getElementById('quiz-options').querySelectorAll('button');
                buttons.forEach(btn => btn.onclick = null);

                if (isCorrect) {
                    this.quizStats.score++;
                    document.getElementById('quiz-score').innerText = this.quizStats.score;
                    selectedBtn.classList.add('correct-ans');
                    selectedBtn.querySelector('i').classList.replace('fa-circle-check', 'fa-check-circle');
                    selectedBtn.querySelector('i').classList.remove('opacity-0');
                } else {
                    selectedBtn.classList.add('wrong-ans');
                    selectedBtn.querySelector('i').classList.replace('fa-circle-check', 'fa-times-circle');
                    selectedBtn.querySelector('i').classList.remove('opacity-0');
                    
                    // Highlight correct answer
                    buttons.forEach((btn, idx) => {
                        if (optionsData[idx].id === this.currentQuizItem.id) {
                            btn.classList.add('correct-ans');
                        }
                    });
                }

                document.getElementById('quiz-next-btn').classList.remove('hidden');
            },

            nextQuizQuestion() {
                this.loadNextQuizQuestion();
            },

            // --- KNOWLEDGE BASE MODE ---
            startKnowledgeMode() {
                this.showScreen('knowledge');
                this.renderKnowledgeList();
            },

            renderKnowledgeList() {
                const listContainer = document.getElementById('knowledge-list');
                // 仅渲染一次
                if (listContainer.children.length > 0) return;
                
                // 更新标题数量
                const titleEl = document.getElementById('knowledge-title-count');
                if(titleEl) titleEl.innerText = `(${linguisticsData.length})`;

                linguisticsData.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = 'bg-white p-5 rounded-2xl shadow-sm border border-gray-200 hover:shadow-md transition-shadow';
                    card.innerHTML = `
                        <div class="flex items-center gap-3 mb-3 pb-3 border-b border-gray-100">
                            <span class="bg-indigo-100 text-indigo-700 font-bold w-8 h-8 rounded-full flex items-center justify-center text-sm">${index + 1}</span>
                            <div>
                                <h3 class="text-lg font-bold text-gray-800">${item.term}</h3>
                                <p class="text-sm text-gray-500">${item.zh_term}</p>
                            </div>
                        </div>
                        <div class="space-y-3">
                            <div>
                                <span class="text-xs font-bold text-indigo-400 uppercase tracking-wider block mb-1">English</span>
                                <p class="text-gray-700 font-medium italic text-sm leading-relaxed"><i class="fa-solid fa-quote-left text-gray-300 mr-2"></i>${item.eng}</p>
                            </div>
                            <div>
                                <span class="text-xs font-bold text-indigo-400 uppercase tracking-wider block mb-1">中文释义</span>
                                <p class="text-gray-700 text-sm leading-relaxed">${item.zh}</p>
                            </div>
                        </div>
                    `;
                    listContainer.appendChild(card);
                });
            },

            // --- SHARED ---
            showResults() {
                this.els.headerStats.classList.add('hidden');
                this.showScreen('results');
                
                const statsContainer = document.getElementById('results-stats-container');
                const messageEl = document.getElementById('results-message');

                if (this.mode === 'swipe') {
                    statsContainer.classList.remove('hidden');
                    document.getElementById('results-remembered').innerText = this.swipeStats.remembered;
                    document.getElementById('results-forgot').innerText = this.swipeStats.forgot;
                    messageEl.innerText = "干得漂亮！复习完成。";
                } else if (this.mode === 'quiz') {
                    statsContainer.classList.add('hidden');
                    const accuracy = Math.round((this.quizStats.score / this.data.length) * 100);
                    messageEl.innerHTML = `测验结束！<br><br>你的得分是: <strong>${this.quizStats.score} / ${this.data.length}</strong><br>准确率: <strong>${accuracy}%</strong>`;
                }
            }
        };

        // Initialize on load
        window.onload = () => {
            app.init();
        };
    </script>
</body>
</html>
